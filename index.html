<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet" />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.18);
            --accent: #7dd3fc;
            --accent2: #c084fc;
            --text: #f0f4f8;
            --text-dim: rgba(240, 244, 248, 0.55);
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            overflow-x: hidden;
            background: #0f1729;
            perspective: 1200px;
        }

        /* ── Animated Sky Background ── */
        .sky {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 30%, #1e3a5f 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 75% 70%, #2d1b69 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 50% 10%, #162d50 0%, transparent 60%),
                linear-gradient(180deg, #0a1628 0%, #1a2744 40%, #0f1c3a 100%);
        }

        /* Floating Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            animation: drift 18s ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        .orb-1 {
            width: 360px;
            height: 360px;
            background: radial-gradient(circle, rgba(60, 130, 210, 0.35), transparent 70%);
            top: -100px;
            left: -80px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(140, 80, 210, 0.3), transparent 70%);
            bottom: -60px;
            right: -60px;
            animation-delay: -6s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(80, 180, 220, 0.25), transparent 70%);
            top: 45%;
            left: 55%;
            animation-delay: -12s;
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(40px, -30px) scale(1.12);
            }
        }

        /* Stars */
        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                radial-gradient(1.2px 1.2px at 10% 15%, rgba(255, 255, 255, 0.7), transparent),
                radial-gradient(1px 1px at 25% 45%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(1.5px 1.5px at 40% 8%, rgba(255, 255, 255, 0.6), transparent),
                radial-gradient(1px 1px at 55% 60%, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(1.2px 1.2px at 70% 25%, rgba(255, 255, 255, 0.7), transparent),
                radial-gradient(1px 1px at 85% 75%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(1.3px 1.3px at 15% 70%, rgba(255, 255, 255, 0.45), transparent),
                radial-gradient(1px 1px at 60% 90%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(1.1px 1.1px at 90% 10%, rgba(255, 255, 255, 0.6), transparent),
                radial-gradient(1px 1px at 5% 50%, rgba(255, 255, 255, 0.4), transparent);
            animation: twinkle 4s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% {
                opacity: .7
            }

            100% {
                opacity: 1
            }
        }

        /* ── Layout ── */
        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        /* ── Search Bar ── */
        .search-wrap {
            width: 100%;
            max-width: 440px;
            margin-bottom: 32px;
            transform-style: preserve-3d;
            animation: slideDown 0.7s cubic-bezier(.22, .68, 0, 1.2) both;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-28px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(18px);
            border-radius: 50px;
            padding: 6px 6px 6px 22px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transition: box-shadow 0.3s, border-color 0.3s;
        }

        .search-bar:focus-within {
            border-color: var(--accent);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3), 0 0 0 3px rgba(125, 211, 252, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 15px;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .search-bar input::placeholder {
            color: var(--text-dim);
        }

        .search-bar button {
            background: linear-gradient(135deg, #3b82f6, #7c3aed);
            border: none;
            color: #fff;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 18px rgba(59, 130, 246, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .search-bar button:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 24px rgba(59, 130, 246, 0.55);
        }

        .search-bar button:active {
            transform: scale(0.95);
        }

        /* ── 3D Card ── */
        .card-scene {
            width: 100%;
            max-width: 520px;
            perspective: 1100px;
            transform-style: preserve-3d;
            animation: riseUp 0.8s cubic-bezier(.22, .68, 0, 1.2) 0.15s both;
        }

        @keyframes riseUp {
            from {
                opacity: 0;
                transform: translateY(36px) rotateX(6deg)
            }

            to {
                opacity: 1;
                transform: translateY(0) rotateX(0)
            }
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px);
            border-radius: 28px;
            padding: 40px 36px;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform-style: preserve-3d;
            transition: transform 0.06s ease-out;
        }

        /* Subtle inner glow */
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            pointer-events: none;
            background: linear-gradient(135deg, rgba(125, 211, 252, 0.06) 0%, transparent 50%, rgba(192, 132, 252, 0.05) 100%);
        }

        /* ── Top Row: Temp + Icon ── */
        .row-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }

        .temp-block {
            display: flex;
            flex-direction: column;
        }

        .temp {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #f0f4f8 30%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 12px rgba(125, 211, 252, 0.25));
            transition: all 0.4s;
        }

        .weather-label {
            margin-top: 6px;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: var(--accent);
            text-transform: capitalize;
            transition: all 0.4s;
        }

        /* 3D Icon Container */
        .icon-box {
            width: 110px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            animation: iconFloat 4s ease-in-out infinite;
        }

        @keyframes iconFloat {

            0%,
            100% {
                transform: translateY(0) rotateY(0deg);
            }

            50% {
                transform: translateY(-8px) rotateY(8deg);
            }
        }

        .icon-inner {
            width: 90px;
            height: 90px;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.03));
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 46px;
            transform: translateZ(10px);
            transition: box-shadow 0.3s;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            margin: 28px 0;
            background: linear-gradient(90deg, transparent, var(--glass-border) 30%, var(--glass-border) 70%, transparent);
            position: relative;
            z-index: 1;
        }

        /* ── City + Date Row ── */
        .row-mid {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }

        .city-name {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .location-icon {
            color: var(--accent2);
            margin-right: 6px;
            font-size: 16px;
        }

        .date-block {
            text-align: right;
        }

        .date-day {
            font-size: 15px;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        .date-full {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* ── Bottom Stats ── */
        .stats {
            display: flex;
            gap: 12px;
            margin-top: 28px;
            position: relative;
            z-index: 1;
        }

        .stat-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px 12px;
            text-align: center;
            transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
            transform-style: preserve-3d;
        }

        .stat-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-3px) translateZ(4px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .stat-icon {
            font-size: 20px;
            margin-bottom: 6px;
        }

        .stat-val {
            font-size: 18px;
            font-weight: 600;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 3px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        /* ── Time Badge ── */
        .time-badge {
            position: absolute;
            top: -18px;
            right: 36px;
            background: linear-gradient(135deg, #3b82f6, #7c3aed);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
            z-index: 2;
            animation: riseUp 0.6s cubic-bezier(.22, .68, 0, 1.2) 0.35s both;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .card {
                padding: 32px 22px;
                border-radius: 22px;
            }

            .temp {
                font-size: 58px;
            }

            .stats {
                gap: 8px;
            }

            .stat-card {
                padding: 14px 8px;
            }

            .stat-val {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <!-- Background layers -->
    <div class="sky"></div>
    <div class="stars"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- App -->
    <div class="page">

        <!-- Search -->
        <div class="search-wrap">
            <div class="search-bar">
                <input type="text" id="locationInput" placeholder="Enter city name…" />
                <button onclick="getWeather()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- 3D Card -->
        <div class="card-scene" id="cardScene">
            <div class="card" id="weatherCard">
                <div class="time-badge" id="timeBadge">--:--</div>

                <!-- Top: Temp + Icon -->
                <div class="row-top">
                    <div class="temp-block">
                        <div class="temp" id="temp">--°C</div>
                        <div class="weather-label" id="weatherLabel">Weather</div>
                    </div>
                    <div class="icon-box">
                        <div class="icon-inner" id="iconInner">🌤️</div>
                    </div>
                </div>

                <div class="divider"></div>

                <!-- Mid: City + Date -->
                <div class="row-mid">
                    <div>
                        <span class="location-icon">📍</span>
                        <span class="city-name" id="cityName">Your City</span>
                    </div>
                    <div class="date-block">
                        <div class="date-day" id="dayName">----</div>
                        <div class="date-full" id="dateFull">----</div>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-icon">💧</div>
                        <div class="stat-val" id="humidity">--%</div>
                        <div class="stat-label">Humidity</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">💨</div>
                        <div class="stat-val" id="wind">-- km/h</div>
                        <div class="stat-label">Wind</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">👁️</div>
                        <div class="stat-val" id="visibility">-- km</div>
                        <div class="stat-label">Visibility</div>
                    </div>
                </div>

            </div><!-- .card -->
        </div><!-- .card-scene -->

    </div><!-- .page -->

    <script>
        // ── 3D Tilt on Mouse Move ──
        const card = document.getElementById('weatherCard');
        const scene = document.getElementById('cardScene');

        scene.addEventListener('mousemove', e => {
            const rect = scene.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            const rotY = (x / rect.width) * 12;
            const rotX = -(y / rect.height) * 10;
            card.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
        });
        scene.addEventListener('mouseleave', () => {
            card.style.transform = 'rotateX(0deg) rotateY(0deg)';
            card.style.transition = 'transform 0.5s cubic-bezier(.22,.68,0,1.2)';
            setTimeout(() => { card.style.transition = 'transform 0.06s ease-out'; }, 520);
        });

        // ── Weather Emoji Map ──
        function getWeatherEmoji(condition) {
            const c = condition.toLowerCase();
            if (c.includes('sunny') || c.includes('clear')) return '☀️';
            if (c.includes('partly cloudy')) return '⛅';
            if (c.includes('cloudy') || c.includes('overcast')) return '☁️';
            if (c.includes('mist') || c.includes('fog')) return '🌫️';
            if (c.includes('drizzle') || c.includes('light rain')) return '🌦️';
            if (c.includes('rain') || c.includes('shower')) return '🌧️';
            if (c.includes('thunder') || c.includes('storm')) return '⛈️';
            if (c.includes('snow') || c.includes('sleet')) return '❄️';
            if (c.includes('blowing')) return '💨';
            return '🌤️';
        }

        // ── Clock Tick ──
        function tickClock() {
            const now = new Date();
            document.getElementById('timeBadge').textContent =
                now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        tickClock();
        setInterval(tickClock, 30000);

        // ── Fetch Weather ──
        const API_KEY = "272ba1a0b75f49618f564236260302";

        async function getWeather() {
            const location = document.getElementById('locationInput').value.trim();
            if (!location) { alert('Please enter a location'); return; }

            try {
                const response = await fetch(
                    `https://api.weatherapi.com/v1/current.json?key=${API_KEY}&q=${encodeURIComponent(location)}&aqi=no`
                );
                if (!response.ok) { alert('City not found — try another name.'); return; }

                const data = await response.json();

                // Temp
                document.getElementById('temp').textContent = data.current.temp_c + '°C';

                // Condition & Icon
                const condition = data.current.condition.text;
                document.getElementById('weatherLabel').textContent = condition;
                document.getElementById('iconInner').textContent = getWeatherEmoji(condition);

                // City
                document.getElementById('cityName').textContent = data.location.name;

                // Date / Day
                const now = new Date();
                document.getElementById('dayName').textContent =
                    now.toLocaleDateString([], { weekday: 'long' });
                document.getElementById('dateFull').textContent =
                    now.toLocaleDateString([], { month: 'long', day: 'numeric', year: 'numeric' });

                // Stats
                document.getElementById('humidity').textContent = data.current.humidity + '%';
                document.getElementById('wind').textContent = data.current.wind_kph + ' km/h';
                document.getElementById('visibility').textContent = data.current.vis_km + ' km';

            } catch (err) {
                console.error(err);
                alert('Network error — please check your connection.');
            }
        }

        // Enter key shortcut
        document.getElementById('locationInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') getWeather();
        });
    </script>

</body>

</html>
